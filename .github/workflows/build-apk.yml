name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Install Android SDK packages
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Prepare artifact
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk output/KASYANOV_PHONE_v1.0.apk
          sha256sum output/KASYANOV_PHONE_v1.0.apk > output/SHA256.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KASYANOV_PHONE_APK
          path: output/*
          if-no-files-found: error
          retention-days: 30
